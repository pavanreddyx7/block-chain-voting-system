<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Published Voting Results</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf3;
      --line: #d9c8b0;
      --ink: #1f2937;
      --muted: #667085;
      --accent: #0f766e;
      --accent-soft: #d7f5ef;
      --shadow: 0 18px 36px rgba(65, 46, 18, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #fff8f0 0, #f4efe7 50%, #ece0cd 100%);
      color: var(--ink);
    }
    .wrap {
      width: min(980px, calc(100% - 32px));
      margin: 30px auto 44px;
    }
    .hero, .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 28px;
      margin-bottom: 20px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 42px);
    }
    .hero p {
      margin: 0;
      color: var(--muted);
    }
    .card {
      padding: 22px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }
    .stat {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
    }
    .num {
      font-size: 32px;
      font-weight: 700;
    }
    .muted {
      color: var(--muted);
    }
    .bars {
      display: grid;
      gap: 14px;
    }
    .bar-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .bar-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .track {
      height: 16px;
      background: #efe4d4;
      border-radius: 999px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #0f766e, #22c55e);
    }
    .note {
      margin-top: 18px;
      padding: 16px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 16px;
    }
    .empty {
      padding: 18px;
      border-radius: 16px;
      background: #fff;
      border: 1px dashed var(--line);
      color: var(--muted);
    }
    @media (max-width: 720px) {
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Published Election Results</h1>
      <p>This page shows the final published results from the admin panel.</p>
    </section>

    <section class="card">
      <div id="content" class="empty">Results have not been published yet.</div>
    </section>
  </div>

  <script>
    async function loadPublishedResults() {
      const content = document.getElementById("content");

      try {
        const response = await fetch("/api/published-results");
        const data = await response.json();

        if (!response.ok) {
          content.className = "empty";
          content.textContent = data.message || "Results have not been published yet.";
          return;
        }

        const leader = data.leadingCandidate || { code: "-", votes: 0 };
        const bars = data.candidates.map((candidate) => {
          const percentage = data.totalVotes ? Math.round((candidate.votes / data.totalVotes) * 100) : 0;
          return `
            <div class="bar-card">
              <div class="bar-head">
                <span>${candidate.name}</span>
                <span>${candidate.votes} votes • ${percentage}%</span>
              </div>
              <div class="track">
                <div class="fill" style="width:${percentage}%"></div>
              </div>
            </div>
          `;
        }).join("");

        content.className = "";
        content.innerHTML = `
          <div class="stats">
            <div class="stat">
              <div class="num">${data.totalVotes}</div>
              <div class="muted">Total votes</div>
            </div>
            <div class="stat">
              <div class="num">${leader.code}</div>
              <div class="muted">Leading candidate</div>
            </div>
            <div class="stat">
              <div class="num">${new Date(data.publishedAt).toLocaleDateString()}</div>
              <div class="muted">Published date</div>
            </div>
          </div>
          <div class="bars">${bars}</div>
          <div class="note">
            <strong>Admin note:</strong> ${data.note || "No admin note added."}<br>
            <strong>Published at:</strong> ${new Date(data.publishedAt).toLocaleString()}
          </div>
        `;
      } catch (error) {
        content.className = "empty";
        content.textContent = "Unable to load published results.";
      }
    }

    loadPublishedResults();
    setInterval(loadPublishedResults, 10000);
  </script>
</body>
</html>
